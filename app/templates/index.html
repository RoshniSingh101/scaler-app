<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalable Cluster Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">
    <div class="container mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 mb-2">
                System Architecture Demo
            </h1>
            <p class="text-slate-400">Scalability Principles in Action</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <div class="flex items-center mb-4 text-cyan-400">
                    <i class="fas fa-network-wired text-2xl mr-3"></i>
                    <h2 class="text-xl font-bold">Active Clone</h2>
                </div>
                <div class="bg-slate-900 p-4 rounded-lg font-mono text-sm border border-cyan-900/50">
                    ID: <span class="text-cyan-300">{{ server_id }}</span>
                </div>
                <p class="mt-4 text-xs text-slate-500 italic">Traffic balanced by Nginx</p>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <div class="flex items-center mb-4 text-orange-500">
                    <i class="fas fa-bolt text-2xl mr-3"></i>
                    <h2 class="text-xl font-bold">Redis State</h2>
                </div>
                <div class="text-4xl font-black text-center py-2">
                    {{ hits }} <span class="text-sm font-normal text-slate-400 italic">Hits</span>
                </div>
                <p class="mt-4 text-xs text-slate-500 italic">Stateless data persistence</p>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <div class="flex items-center mb-4 text-purple-500">
                    <i class="fas fa-microchip text-2xl mr-3"></i>
                    <h2 class="text-xl font-bold">Async Queue</h2>
                </div>
                <button onclick="triggerTask()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                    Trigger RabbitMQ Task
                </button>
                <div id="taskStatus" class="mt-4 text-xs text-center text-slate-400">Ready for processing</div>
            </div>
        </div>
    </div>

    <script>
        async function triggerTask() {
            const status = document.getElementById('taskStatus');
            status.innerText = "🚀 Task sent to RabbitMQ...";
            
            // first, start the task and get the ID
            const response = await fetch('/process-video?video_id=fancy_ui_test', {method: 'POST'});
            const data = await response.json();
            const taskId = data.task_id;

            // poll for the result
            const checkInterval = setInterval(async () => {
                const res = await fetch(`/task-status/${taskId}`);
                const taskData = await res.json();

                if (taskData.task_status === 'SUCCESS') {
                    clearInterval(checkInterval);
                    const success = taskData.task_result.success;
                    status.innerText = success ? "✅ Worker Finished: SUCCESS!" : "❌ Worker Finished: FAILED!";
                    status.classList.replace('text-purple-400', success ? 'text-green-400' : 'text-red-400');
                } else if (taskData.task_status === 'FAILURE') {
                    clearInterval(checkInterval);
                    status.innerText = "💥 System Error!";
                } else {
                    status.innerText = "⏳ Worker is still thinking...";
                }
            }, 2000); // check every 2 seconds
        }
    </script>
</body>
</html>
