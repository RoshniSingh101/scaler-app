<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cluster Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">
    <div class="container mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 mb-2">
                System Architecture
            </h1>
            <p class="text-slate-400">Scalability Principles in Action</p>
        </header>

        {% block content %}{% endblock %}
    </div>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
