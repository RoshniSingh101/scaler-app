services:
  redis:
    image: redis:alpine
  
  memcached:
    image: memcached:alpine

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15673:15672" # RabbitMQ Dashboard

  app-clone-1: # clone1
    build: ./app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      - REDIS_HOST=redis
      - RABBITMQ_URL=pyamqp://guest@rabbitmq//
    depends_on:
      - redis
      - rabbitmq

  app-clone-2: # clone2
    build: ./app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      - REDIS_HOST=redis
      - RABBITMQ_URL=pyamqp://guest@rabbitmq//
    depends_on:
      - redis
      - rabbitmq

  worker: # ensured worker build under app, not worker folder
    build: ./app
    depends_on: [rabbitmq]
    command: celery -A tasks worker --loglevel=info

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      app-clone-1:
        condition: service_started
      app-clone-2:
        condition: service_started