events { worker_connections 1024; }

http {
    upstream my_app {
        # 'max_fails' and 'fail_timeout' tell Nginx to keep trying 
        # if the clones aren't ready immediately
        server app-clone-1:8000 max_fails=3 fail_timeout=5s;
        server app-clone-2:8000 max_fails=3 fail_timeout=5s;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://my_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}