name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # JOB 1: Build the images and push to Docker Hub
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push App
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/scaler-app:latest

  # JOB 2: Connect to your server and pull the new code
  deploy:
    needs: build # Only runs if build finishes successfully
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}     # Your Server IP
          username: ${{ secrets.SERVER_USER }} # Usually 'root' or 'ubuntu'
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # Your SSH Private Key
          script: |
            cd /path/to/your/project
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f