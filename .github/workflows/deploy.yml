name: Cluster CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # static analysis (Python & linting)
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flake8
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi
      - name: Lint with flake8
        # ignore 'app' module errors because use PYTHONPATH in Docker
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # integration testing (cluster check)
  build-and-test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the Cluster
        run: docker compose build

      - name: Start Services
        run: docker compose up -d

      - name: Wait for Services (Health Check)
        run: |
          timeout 60s bash -c 'until curl -s localhost:8080 | grep "System Architecture"; do sleep 5; done'
        # confirm Nginx, FastAPI, and Jinja2 are all working together.

      - name: Check Container Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Shutdown
        run: docker compose down