name: Local CI Pipeline
on:
  push:
    branches: [ main ]

jobs:
  # STEP 1: The "Grammar Check"
  # Ensures your Python code doesn't have syntax errors or missing imports.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install Linting Tools
        run: pip install flake8
        
      - name: Lint with flake8
        run: |
          # Fails the build if there are critical Python errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # STEP 2: The "Recipe Check"
  # Ensures your Dockerfiles and docker-compose.yml are formatted correctly.
  build-check:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker Compose Syntax
        run: docker compose config

      - name: Test Docker Build
        run: docker compose build